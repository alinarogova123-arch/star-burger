version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: always
    command: gunicorn star_burger.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - prod_media_assets:/app/media
      - prod_static_assets:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      - db

volumes:
  prod_postgres_data:
  prod_media_assets:
  prod_static_assets: