version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=starburger
      - POSTGRES_USER=burger_user
      - POSTGRES_PASSWORD=burger_password
    ports:
      - "5432:5432"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_caravan:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_NAME=starburger
      - DB_USER=burger_user
      - DB_URL=postgresql://burger_user:burger_password@db:5432/starburger
    depends_on:
      - db

volumes:
  postgres_data:
  media_caravan: